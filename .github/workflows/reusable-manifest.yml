name: (resuable) Manifest

on:
  workflow_call:
    inputs:
      build-commit-sha:
        type: string
        required: true
      source:
        type: string
        required: true
    secrets:
      docker-password:
        required: true
      docker-username:
        required: true

jobs:
  manifest:
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-${{ inputs.source }}-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ inputs.source }}
          tags: |
            type=sha,prefix=,enable=true,format=short
            type=raw,prefix=,enable={{is_default_branch}},value=${{ github.ref_name }}
          flavor: latest=false
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker-username }}
          password: ${{ secrets.docker-password }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: jq <<< "$DOCKER_METADATA_OUTPUT_JSON"
      - run: |
          docker buildx imagetools create $(jq --compact-output --raw-output '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}/${{ inputs.source }}@sha256:%s ' *)
        working-directory: /tmp/digests
      - run: |
          DOCKER_REPOSITORY_SLUG=$(printf '%s/%s' "$DOCKER_USERNAME" "$DOCKER_REPOSITORY" | tr '[:upper:]' '[:lower:]')

          if [ "$GITHUB_REF_NAME" == "master" ]; then
            DOCKER_IMAGE_TAG=${DOCKER_IMAGE_SOURCE}
          else
            DOCKER_IMAGE_TAG="nightly-${DOCKER_IMAGE_SOURCE}-${DOCKER_BUILD_COMMIT_SHA}"
          fi

          docker buildx imagetools create --debug --tag=${DOCKER_REPOSITORY_SLUG}:${DOCKER_IMAGE_TAG} \
            ghcr.io/${{ github.repository }}/${DOCKER_IMAGE_SOURCE}:${DOCKER_BUILD_COMMIT_SHA}
        env:
          DOCKER_USERNAME: ${{ secrets.docker-username }}
          DOCKER_PASSWORD: ${{ secrets.docker-password }}
          DOCKER_REPOSITORY: ${{ github.event.repository.name }}
          DOCKER_IMAGE_SOURCE: ${{ inputs.source }}
          DOCKER_BUILD_COMMIT_SHA: ${{ inputs.build-commit-sha }}
    runs-on: ubuntu-22.04
