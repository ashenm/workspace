name: (resuable) Manifest

on:
  workflow_call:
    inputs:
      build-commit-sha:
        type: string
        required: true
      source:
        type: string
        required: true
    secrets:
      docker-password:
        required: true
      docker-username:
        required: true

jobs:
  manifest:
    strategy:
      matrix:
        registry: [docker.io, ghcr.io]
        include:
          - registry: docker.io
            images: ${{ github.repository }}
            tags: |
              type=raw,prefix=,enable={{is_default_branch}},value=${{ inputs.source }}
            run: ${{ case(github.ref_name == 'master', 'execute', 'skip') }}
          - registry: ghcr.io
            images: ghcr.io/${{ github.repository }}/${{ inputs.source }}
            tags: |
              type=sha,prefix=,enable=true,format=short
              type=raw,prefix=,enable={{is_default_branch}},value=${{ github.ref_name }}
            run: execute
    steps:
      - id: metadata
        if: ${{ matrix.run == 'execute' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.images }}
          tags: ${{ matrix.tags }}
          flavor: latest=false
      - if: ${{ matrix.run == 'execute' }}
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-${{ inputs.source }}-*
          merge-multiple: true
      - if: ${{ matrix.run == 'execute' }}
        uses: docker/setup-buildx-action@v3
      - if: ${{ matrix.run == 'execute' }}
        run: jq <<< "$DOCKER_METADATA_OUTPUT_JSON"
      - uses: docker/login-action@v3
        if: ${{ matrix.run == 'execute' && matrix.registry == 'docker.io' }}
        with:
          username: ${{ secrets.docker-username }}
          password: ${{ secrets.docker-password }}
      - if: ${{ matrix.run == 'execute' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: ${{ matrix.run == 'execute' }}
        run: |
          docker buildx imagetools create $(jq --compact-output --raw-output '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}/${{ inputs.source }}@sha256:%s ' *)
        working-directory: /tmp/digests
    runs-on: ubuntu-22.04
